<!DOCTYPE html>
<html>
<head>
  <title>Checkout - KingsCraft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: black;
      color: white;
      font-family: Georgia, serif;
      padding: 40px;
    }

    h1 {
      color: #e2bc6c;
      text-align: center;
    }

    .product {
      text-align: center;
      margin-bottom: 30px;
    }

    .product img {
      width: 150px;
      margin-bottom: 10px;
    }

    .product-name {
      font-size: 20px;
    }

    .product-price {
      color: gold;
      margin-top: 5px;
    }

    .form {
      max-width: 500px;
      margin: auto;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #111;
      border: 1px solid #333;
      color: white;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      font-weight: bold;
      margin-top: 20px;
      cursor: pointer;
    }

    /* 🔥 Disabled state */
    .disabled {
      background: #555;
      color: #999;
      cursor: not-allowed;
    }

    /* 🔥 Active state */
    .active {
      background: gold;
      color: black;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Shipping Details</h1>

<!-- PRODUCT DISPLAY -->
<div id="productDisplay" class="product"></div>

<div class="form">
  <input id="name" placeholder="Full Name">
  <input id="address" placeholder="Address">
  <input id="city" placeholder="City">
  <input id="postal" placeholder="Postal Code">
  <input id="email" placeholder="Email">

  <button id="placeOrderBtn" class="disabled" disabled onclick="placeOrder()">Review Your Order</button>
</div>

<script>
// 🔥 LOAD PRODUCT (buy now OR cart)
const singleProduct = JSON.parse(localStorage.getItem("checkoutProduct"));
const cart = JSON.parse(localStorage.getItem("cart")) || [];

const display = document.getElementById("productDisplay");

// Show single product OR cart preview
if (singleProduct) {
  display.innerHTML = `
    <img src="FullLogo.png">
    <div class="product-name">${singleProduct.name}</div>
    <div class="product-price">$${singleProduct.price}</div>
  `;
} else if (cart.length > 0) {
  display.innerHTML = `<div>${cart.length} item(s) in cart</div>`;
}

// 🔥 FORM VALIDATION
const inputs = document.querySelectorAll("input");
const button = document.getElementById("placeOrderBtn");

inputs.forEach(input => {
  input.addEventListener("input", checkForm);
});

function checkForm() {
  let filled = true;

  inputs.forEach(input => {
    if (input.value.trim() === "") {
      filled = false;
    }
  });

  if (filled) {
    button.disabled = false;
    button.classList.remove("disabled");
    button.classList.add("active");
  } else {
    button.disabled = true;
    button.classList.add("disabled");
    button.classList.remove("active");
  }
}

// 🔥 PLACE ORDER → go to review page
function placeOrder() {
  window.location.href = "review.html";
}
</script>

</body>
</html>
