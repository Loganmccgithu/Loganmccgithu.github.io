<!DOCTYPE html>
<html>
<head>
  <title>Checkout - KingsCraft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: black;
      color: white;
      font-family: Georgia, serif;
      padding: 40px;
    }

    h1 {
      color: #e2bc6c;
      text-align: center;
    }

    .form {
      max-width: 500px;
      margin: auto;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #111;
      border: 1px solid #333;
      color: white;
    }

    button {
      width: 100%;
      padding: 15px;
      background: gold;
      border: none;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>Shipping Details</h1>

<div class="form">
  <input placeholder="Full Name">
  <input placeholder="Address">
  <input placeholder="City">
  <input placeholder="Postal Code">
  <input placeholder="Email">

  <button>Place Order</button>
</div>

</body>
</html>
