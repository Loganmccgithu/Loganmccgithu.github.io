<!DOCTYPE html>
<html>
<head>
  <title>Checkout - KingsCraft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: black;
      color: white;
      font-family: Georgia, serif;
      padding: 40px;
    }

    h1 {
      color: #e2bc6c;
      text-align: center;
    }

    .product {
      text-align: center;
      margin-bottom: 30px;
    }

    .product img {
      width: 150px;
      margin-bottom: 10px;
    }

    .product-name {
      font-size: 20px;
    }

    .product-price {
      color: gold;
      margin-top: 5px;
    }

    .form {
      max-width: 500px;
      margin: auto;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #111;
      border: 1px solid #333;
      color: white;
    }

    button {
      width: 100%;
      padding: 15px;
      background: gold;
      border: none;
      font-weight: bold;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Shipping Details</h1>

<!-- 🔥 PRODUCT DISPLAY -->
<div id="productDisplay" class="product"></div>

<div class="form">
  <input placeholder="Full Name">
  <input placeholder="Address">
  <input placeholder="City">
  <input placeholder="Postal Code">
  <input placeholder="Email">

  <button>Place Order</button>
</div>

<script>
const product = JSON.parse(localStorage.getItem("checkoutProduct"));

if (product) {
  document.getElementById("productDisplay").innerHTML = `
    <img src="${product.image}">
    <div class="product-name">${product.name}</div>
    <div class="product-price">$${product.price}</div>
  `;
}
</script>

</body>
</html>
