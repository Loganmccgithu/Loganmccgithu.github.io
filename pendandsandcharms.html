<!DOCTYPE html>
<html>
<head>
  <title>Pendants and Charms - KingsCraft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: black;
      color: #e2bc6c;
    }

    header {
      text-align: center;
      padding: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    header img {
      max-width: 150px;
    }

    h1 {
      text-align: center;
      margin: 40px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 40px;
    }

    .product-card {
      text-decoration: none;
      color: white;
    }

    .product-card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .product-info {
      padding: 10px 0;
      text-align: center;
    }

    .price {
      color: gold;
      margin-top: 5px;
    }

    .product-card:hover {
      transform: scale(1.03);
      transition: 0.2s;
    }

    .back {
      display: block;
      text-align: center;
      margin: 30px;
      color: #ccc;
      text-decoration: none;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

<header>
  <img src="FullLogo.png">
</header>

<h1>Rings</h1>

<div class="grid">

  <!-- PRODUCT 1 -->
  <a href="pendant1.html" class="product-card">
    <img src="Cross1.jpg">
    <div class="product-info">
      <div>Signature Cross Ring</div>
      <div class="price">$79.99</div>
    </div>
  </a>

  <!-- PRODUCT 2 -->
  <a href="ring2.html" class="product-card">
    <img src="tempp.png">
    <div class="product-info">
      <div>Diamond Edge Ring</div>
      <div class="price">$89.99</div>
    </div>
  </a>

  <!-- PRODUCT 3 -->
  <a href="ring3.html" class="product-card">
    <img src="tempp.png">
    <div class="product-info">
      <div>Classic Gold Ring</div>
      <div class="price">$69.99</div>
    </div>
  </a>

</div>

<a href="index.html" class="back">← Back to Home</a>

</body>
</html>
