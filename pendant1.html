<!DOCTYPE html>
<html>
<head>
  <title>Signature Cratered Cross</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: black;
      color: white;
    }

    header {
      text-align: center;
      padding: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }

    header img {
      max-width: 150px;
    }

    .cart-icon {
      position: absolute;
      top: 30px;
      right: 30px;
      font-size: 24px;
      cursor: pointer;
    }

    .cart-icon span {
      background: gold;
      color: black;
      font-size: 14px;
      padding: 3px 8px;
      border-radius: 50%;
      margin-left: 5px;
    }

    .cart-bounce {
      transform: scale(1.4);
      transition: transform 0.5s ease;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 28px;
      color: #ccc;
      text-decoration: none;
      z-index: 1000;
      transition: 0.2s;
    }

    .back-btn:hover {
      color: white;
      transform: translateX(-3px);
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 50px;
      padding: 60px 20px;
      justify-content: center;
      align-items: flex-start;
    }

    /* IMAGE SECTION */
    .images {
      max-width: 400px;
    }

    .images img {
      width: 100%;
    }

    .thumbnails {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .thumbnails img {
      width: 70px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* PRODUCT INFO */
    .info {
      max-width: 400px;
    }

    .info h2 {
      color: #e2bc6c;
    }

    .price {
      color: gold;
      font-size: 22px;
      margin: 15px 0;
    }

    .buttons {
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
      border: none;
    }

    .buy {
      background: gold;
      color: black;
    }

    .cart {
      background: transparent;
      color: white;
      border: 1px solid white;
    }

    .cart.animate {
      transform: scale(1.15);
      transition: transform 0.5s ease;
    }

    .back {
      display: block;
      text-align: center;
      margin: 40px;
      color: #ccc;
      text-decoration: none;
    }
  </style>
</head>

<body>

<a href="PAC.html" class="back-btn">←</a>

<header>
  <img src="FullLogo.png">

  <div class="cart-icon" onclick="goToCart()">
    🛒 <span id="cartCount">0</span>
  </div>
</header>

<div class="container">

  <!-- LEFT: IMAGES -->
  <div class="images">
    <img id="mainImage" src="Cross1.jpg">

    <div class="thumbnails">
      <img src="Cross1.jpg" onclick="changeImage('Cross1.jpg')">
      <img src="Cross2.jpg" onclick="changeImage('Cross2.jpg')">
      <img src="Cross3.jpg" onclick="changeImage('Cross3.jpg')">
      <img src="back2.jpg" onclick="changeImage('back2.jpg')">
    </div>
  </div>

  <!-- RIGHT: INFO -->
  <div class="info">
    <h2>Signature Cratered Cross Pendant</h2>

    <p>
      A handcrafted cross built to last.
      Each piece features a cratered design and a fine polish that reflects light beautifully,
      making it perfect for everyday wear or statement styling.
    </p>

    <div class="price">$249.99</div>

    <div style="margin-top:15px;">
      <label style="display:block; margin-bottom:5px;">Select Loop Size:</label>

      <select id="sizeSelect" style="padding:8px; background:#111; color:white; border:1px solid #333;">
        <option value="Small Loop - 4mm Inner Diameter">Small Loop - 4mm Inner Diameter</option>
        <option value="Medium Loop - 6mm Inner Diameter">Medium Loop - 6mm Inner Diameter</option>
        <option value="Large Loop - 8mm Inner Diameter">Large Loop - 8mm Inner Diameter</option>
      </select>
    </div>

    <div class="buttons">
      <button class="buy" onclick="buyNow('Signature Cratered Cross Pendant', 249.99, 'Cross1.jpg', 'pendant')">Buy Now</button>
      <button class="cart" onclick="addToCart(this)">Add to Cart</button>
    </div>
  </div>

</div>

<script>
function changeImage(src) {
  document.getElementById("mainImage").src = src;
}

// BUY NOW
async function buyNow(name, price, image, type) {
  const size = document.getElementById("sizeSelect").value;

  const cart = [{
    name,
    price,
    image,
    type,
    size: size
  }];

  try {
    const response = await fetch("https://kingscraft-backend.onrender.com/create-checkout-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ cart })
    });

    const data = await response.json();
    window.location.href = data.url;

  } catch (err) {
    console.error("ERROR:", err);
  }
}

// ADD TO CART
function addToCart(button) {
  const size = document.getElementById("sizeSelect").value;

  const product = {
    name: "Signature Cratered Cross Pendant",
    price: 249.99,
    image: "Cross1.jpg",
    type: "pendant",
    size: size
  };

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));

  updateCartCount();

  if (button) {
    button.classList.add("animate");
    setTimeout(() => button.classList.remove("animate"), 200);
  }

  const icon = document.querySelector(".cart-icon");

  if (icon) {
    icon.classList.add("cart-bounce");
    setTimeout(() => icon.classList.remove("cart-bounce"), 200);
  }
}

// UPDATE COUNT
function updateCartCount() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  document.getElementById("cartCount").innerText = cart.length;
}

// GO TO CART PAGE
function goToCart() {
  window.location.href = "cart.html";
}

// LOAD COUNT ON PAGE LOAD
updateCartCount();
</script>

</body>
</html>
