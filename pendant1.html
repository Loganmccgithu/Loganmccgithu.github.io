<!DOCTYPE html>
<html>
<head>
  <title>Signature cavitated Cross </title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: black;
      color: white;
    }

    header {
      text-align: center;
      padding: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    header img {
      max-width: 150px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 50px;
      padding: 60px 20px;
      justify-content: center;
      align-items: flex-start;
    }

    /* IMAGE SECTION */
    .images {
      max-width: 400px;
    }

    .images img {
      width: 100%;
    }

    .thumbnails {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .thumbnails img {
      width: 70px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* PRODUCT INFO */
    .info {
      max-width: 400px;
    }

    .info h2 {
      color: #e2bc6c;
    }

    .price {
      color: gold;
      font-size: 22px;
      margin: 15px 0;
    }

    .buttons {
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
      border: none;
    }

    .buy {
      background: gold;
      color: black;
    }

    .cart {
      background: transparent;
      color: white;
      border: 1px solid white;
    }

    .back {
      display: block;
      text-align: center;
      margin: 40px;
      color: #ccc;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  <img src="FullLogo.png">
</header>

<div class="container">

  <!-- LEFT: IMAGES -->
  <div class="images">
    <img id="mainImage" src="Cross1.jpg">

    <div class="thumbnails">
      <img src="Cross1.jpg" onclick="changeImage('Cross1.jpg')">
      <img src="Cross2.jpg" onclick="changeImage('Cross2.jpg')">
      <img src="Cross3.jpg" onclick="changeImage('Cross3.jpg')">
      <img src="back2.jpg" onclick="changeImage('back2.jpg')">
    </div>
  </div>

  <!-- RIGHT: INFO -->
  <div class="info">
    <h2>Signature Cratered Cross Pendant</h2>

    <p>
      A handcrafted cross built to last.
      Each piece features a cavitated design and a fine polish that reflects light beautifully,
      making it perfect for everyday wear or statement styling.
    </p>

    <div class="price">$249.99</div>

    <div class="buttons">
      <button class="buy">Buy Now</button>
      <button class="cart">Add to Cart</button>
    </div>
  </div>

</div>

<a href="PAC.html" class="back">← Back</a>

<script>
function changeImage(src) {
  document.getElementById("mainImage").src = src;
}
</script>

</body>
</html>
