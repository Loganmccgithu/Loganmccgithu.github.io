<!DOCTYPE html>
<html>
<head>
  <title>Flexible Silver Foxtail Bracelet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: black;
      color: white;
    }

    header {
      text-align: center;
      padding: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }

    header img {
      max-width: 150px;
    }

    .cart-icon {
      position: absolute;
      top: 30px;
      right: 30px;
      font-size: 24px;
      cursor: pointer;
    }

    .cart-icon span {
      background: gold;
      color: black;
      font-size: 14px;
      padding: 3px 8px;
      border-radius: 50%;
      margin-left: 5px;
    }

    .cart-bounce {
      transform: scale(1.4);
      transition: transform 0.5s ease;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 50px;
      padding: 60px 20px;
      justify-content: center;
      align-items: flex-start;
    }

    .images {
      max-width: 400px;
    }

    .main-image-container {
      width: 100%;
      height: 400px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .main-image-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: opacity 0.2s ease;
    }

    .thumbnails {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .thumbnails img {
      width: 70px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .info {
      max-width: 400px;
    }

    .info h2 {
      color: #e2bc6c;
    }

    .price {
      color: gold;
      font-size: 22px;
      margin: 15px 0;
    }

    .buttons {
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
      border: none;
    }

    .buy {
      background: gold;
      color: black;
    }

    .cart {
      background: transparent;
      color: white;
      border: 1px solid white;
    }

    .cart.animate {
      transform: scale(1.15);
      transition: transform 0.5s ease;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 28px;
      color: #ccc;
      text-decoration: none;
      z-index: 1000;
      transition: 0.2s;
    }

    .back-btn:hover {
      color: white;
      transform: translateX(-3px);
    }
  </style>
</head>

<body>

<a href="bracelets.html" class="back-btn">←</a>

<header>
  <img src="FullLogo.png">

  <div class="cart-icon" onclick="goToCart()">
    🛒 <span id="cartCount">0</span>
  </div>
</header>
  
<div class="container">

  <div class="images">

    <div class="main-image-container">
      <img id="mainImage" src="bracelet2.png">
    </div>

    <div class="thumbnails">
      <img src="bracelet2.png" onclick="changeImage('bracelet2.png')">
      <img src="bracelet1.png" onclick="changeImage('bracelet1.png')">
      <img src="bracelet3.png" onclick="changeImage('bracelet3.png')">
    </div>
  </div>

  <div class="info">
    <h2>Flexible Silver Foxtail Bracelet</h2>

    <p>
      A handmade flexible, stirling silver, double foxtail, bracelet.
      the clasp design shown is an old version, new version may be different.
    </p>

    <div class="price">$680.99</div>

    <div style="margin-top:15px;">
      <label style="display:block; margin-bottom:5px;">Bracelet size:</label>

      <select id="sizeSelect" style="padding:8px; background:#111; color:white; border:1px solid #333;">
        <option value="5&quot;">5"</option>
        <option value="5 1/2&quot;">5 1/2"</option>
        <option value="6&quot;">6"</option>
        <option value="6 1/2&quot;">6 1/2"</option>
        <option value="7&quot;">7"</option>
        <option value="7 1/2&quot;">7 1/2"</option>
        <option value="8&quot;">8"</option>
        <option value="8 1/2&quot;">8 1/2"</option>
        <option value="9&quot;">9"</option>
        <option value="9 1/2&quot;">9 1/2"</option>
        <option value="10&quot;">10"</option>
        <option value="10 1/2&quot;">10 1/2"</option>
      </select>
    </div>

    <div class="buttons">
      <button class="buy" onclick="buyNow('Flexible Silver Foxtail Bracelet', 680.99, 'bracelet2.png')">
        Buy Now
      </button>
      <button class="cart" onclick="addToCart(this)">Add to Cart</button>
    </div>
  </div>

</div>

<script>
function changeImage(src) {
  const img = document.getElementById("mainImage");
  img.style.opacity = 0;

  setTimeout(() => {
    img.src = src;
    img.style.opacity = 1;
  }, 100);
}

function showLoading() {
  document.getElementById("loadingPopup").style.display = "flex";
}

function hideLoading() {
  document.getElementById("loadingPopup").style.display = "none";
}

async function buyNow(name, price, image) {

  showLoading();

  const size = document.getElementById("sizeSelect").value;

  const cart = [{
    name,
    price,
    image,
    type: "bracelet",
    size: size
  }];

  try {
    const response = await fetch("https://kingscraft-backend.onrender.com/create-checkout-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ cart })
    });

    const data = await response.json();
    window.location.href = data.url;

  } catch (err) {
    hideLoading();
    console.error("ERROR:", err);
    alert("Checkout failed. Please try again.");
  }
}

function addToCart(button) {
  const size = document.getElementById("sizeSelect").value;

  const product = {
    name: "Flexible Silver Foxtail Bracelet",
    price: 680.99,
    image: "bracelet2.png",
    type: "bracelet",
    size: size
  };

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));

  updateCartCount();

  button.classList.add("animate");
  setTimeout(() => button.classList.remove("animate"), 200);

  const icon = document.querySelector(".cart-icon");
  icon.classList.add("cart-bounce");
  setTimeout(() => icon.classList.remove("cart-bounce"), 200);
}

function updateCartCount() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  document.getElementById("cartCount").innerText = cart.length;
}

function goToCart() {
  window.location.href = "cart.html";
}

updateCartCount();
</script>

<div id="loadingPopup" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  z-index:9999;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  font-family:Georgia, serif;
">

  <div style="
    width:60px;
    height:60px;
    border:5px solid #333;
    border-top:5px solid gold;
    border-radius:50%;
    animation:spin 1s linear infinite;
  "></div>

  <p style="margin-top:20px; font-size:20px;">
    Preparing Secure Checkout...
  </p>

  <button onclick="hideLoading()" style="
    margin-top:25px;
    background:transparent;
    border:1px solid white;
    color:white;
    padding:10px 20px;
    cursor:pointer;
    font-family:Georgia, serif;
  ">
    ← Back
  </button>

</div>

<style>
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>

</body>
</html>
