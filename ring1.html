<!DOCTYPE html>
<html>
<head>
  <title>Silver Heart Ring</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: black;
      color: white;
    }

    header {
      text-align: center;
      padding: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: relative; /* 🔥 needed for cart icon */
    }

    header img {
      max-width: 150px;
    }

    /* 🔥 CART ICON */
    .cart-icon {
      position: absolute;
      top: 30px;
      right: 30px;
      font-size: 24px;
      cursor: pointer;
    }

    .cart-icon span {
      background: gold;
      color: black;
      font-size: 14px;
      padding: 3px 8px;
      border-radius: 50%;
      margin-left: 5px;
    }

    .cart-bounce {
      transform: scale(1.4);
      transition: transform 0.5s ease; /* smooth return */
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 50px;
      padding: 60px 20px;
      justify-content: center;
      align-items: flex-start;
    }

    .images {
      max-width: 400px;
    }

    .main-image-container {
      width: 100%;
      height: 400px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .main-image-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: opacity 0.2s ease;
    }

    .thumbnails {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .thumbnails img {
      width: 70px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .info {
      max-width: 400px;
    }

    .info h2 {
      color: #e2bc6c;
    }

    .price {
      color: gold;
      font-size: 22px;
      margin: 15px 0;
    }

    .buttons {
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
      border: none;
    }

    .buy {
      background: gold;
      color: black;
    }

    .cart {
      background: transparent;
      color: white;
      border: 1px solid white;
    }

    .cart.animate {
      transform: scale(1.15);
      transition: transform 0.5s ease; /* smooth return */
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 28px;
      color: #ccc;
      text-decoration: none;
      z-index: 1000;
      transition: 0.2s;
    }

    .back-btn:hover {
      color: white;
      transform: translateX(-3px);
    }
  </style>
</head>

<body>

<a href="rings.html" class="back-btn">←</a>

<header>
  <img src="FullLogo.png">

  <!-- 🔥 CART ICON -->
  <div class="cart-icon" onclick="goToCart()">
    🛒 <span id="cartCount">0</span>
  </div>
</header>
  
<div class="container">

  <!-- LEFT: IMAGES -->
  <div class="images">

    <div class="main-image-container">
      <img id="mainImage" src="heartring4.jpg">
    </div>

    <div class="thumbnails">
      <img src="heartring4.jpg" onclick="changeImage('heartring4.jpg')">
      <img src="heartring6.png" onclick="changeImage('heartring6.png')">
      <img src="heartring5.png" onclick="changeImage('heartring5.png')">
    </div>
  </div>

  <!-- RIGHT: INFO -->
  <div class="info">
    <h2>Silver Heart Ring</h2>

    <p>
      A handmade stirling silver heart ring designed with elegance and simplicity in mind,
      a timeless classic.
    </p>

    <div class="price">$219.99</div>

    <div style="margin-top:15px;">
  <label style="display:block; margin-bottom:5px;">Select Size:</label>

  <select id="sizeSelect" style="padding:8px; background:#111; color:white; border:1px solid #333;">
    <option value="Size 4">Size 4</option>
    <option value="Size 4 1/2">Size 4 1/2</option>
    <option value="Size 5">Size 5</option>
    <option value="Size 5 1/2">Size 5 1/2</option>
    <option value="Size 6">Size 6</option>
    <option value="Size 6 1/2">Size 6 1/2</option>
    <option value="Size 7">Size 7</option>
    <option value="Size 7 1/2">Size 7 1/2</option>
    <option value="Size 8">Size 8</option>
    <option value="Size 8 1/2">Size 8 1/2</option>
    <option value="Size 9">Size 9</option>
    <option value="Size 9 1/2">Size 9 1/2</option>
    <option value="Size 10">Size 10</option>
    <option value="Size 10 1/2">Size 10 1/2</option>
    <option value="Size 11">Size 11</option>
    <option value="Size 11 1/2">Size 11 1/2</option>
    <option value="Size 12">Size 12</option>
    <option value="Size 12 1/2">Size 12 1/2</option>
    <option value="Size 13">Size 13</option>
  </select>
</div>

    <div class="buttons">
      <button class="buy" onclick="buyNow('Silver Heart Ring', 219.99, 'heartring4.jpg', 'ring')">
        Buy Now
      </button>
      <button class="cart" onclick="addToCart(this)">Add to Cart</button>
    </div>
  </div>

</div>

<script>
// IMAGE SWITCH
function changeImage(src) {
  const img = document.getElementById("mainImage");
  img.style.opacity = 0;

  setTimeout(() => {
    img.src = src;
    img.style.opacity = 1;
  }, 100);
}

// BUY NOW
async function buyNow(name, price, image) {
  const size = document.getElementById("sizeSelect").value;

  const cart = [{
    name,
    price,
    image,
    type: "ring",
    size: size
  }];

  try {
    const response = await fetch("https://kingscraft-backend.onrender.com/create-checkout-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ cart })
    });

    const data = await response.json();
    window.location.href = data.url;

  } catch (err) {
    console.error("ERROR:", err);
  }
}

// ADD TO CART
function addToCart(button) {
  const sizeSelect = document.getElementById("sizeSelect");

  if (!sizeSelect) {
    alert("Size selector not found.");
    return;
  }

  const size = sizeSelect.value;

  const product = {
    name: "Silver Heart Ring",
    price: 219.99,
    image: "heartring4.jpg",
    type: "ring",
    size: size
  };

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));

  updateCartCount();

  button.classList.add("animate");
  setTimeout(() => button.classList.remove("animate"), 200);

  const icon = document.querySelector(".cart-icon");
  icon.classList.add("cart-bounce");
  setTimeout(() => icon.classList.remove("cart-bounce"), 200);
}

// GO TO CART PAGE
function goToCart() {
  window.location.href = "cart.html";
}

// LOAD COUNT ON PAGE LOAD
updateCartCount();
</script>

</body>
</html>
