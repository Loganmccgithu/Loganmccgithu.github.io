<!DOCTYPE html>
<html>
<head>
  <title>Silver Heart Ring</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: black;
      color: white;
    }

    header {
      text-align: center;
      padding: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    header img {
      max-width: 150px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 50px;
      padding: 60px 20px;
      justify-content: center;
      align-items: flex-start;
    }

    /* IMAGE SECTION */
    .images {
      max-width: 400px;
    }

    .main-image-container {
      width: 100%;
      height: 400px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .main-image-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: opacity 0.2s ease;
    }

    .thumbnails {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .thumbnails img {
      width: 70px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* PRODUCT INFO */
    .info {
      max-width: 400px;
    }

    .info h2 {
      color: #e2bc6c;
    }

    .price {
      color: gold;
      font-size: 22px;
      margin: 15px 0;
    }

    .buttons {
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
      border: none;
    }

    .buy {
      background: gold;
      color: black;
    }

    .cart {
      background: transparent;
      color: white;
      border: 1px solid white;
    }

    /* 🔥 Animation */
    .cart.animate {
      transform: scale(1.5);
      transition: 0.2s;
    }

    .back {
      display: block;
      text-align: center;
      margin: 40px;
      color: #ccc;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  <img src="FullLogo.png">
</header>
  
<div class="container">

  <!-- LEFT: IMAGES -->
  <div class="images">

    <div class="main-image-container">
      <img id="mainImage" src="heartring4.jpg">
    </div>

    <div class="thumbnails">
      <img src="heartring4.jpg" onclick="changeImage('heartring4.jpg')">
      <img src="heartring6.png" onclick="changeImage('heartring6.png')">
      <img src="heartring5.png" onclick="changeImage('heartring5.png')">
    </div>
  </div>

  <!-- RIGHT: INFO -->
  <div class="info">
    <h2>Silver Heart Ring</h2>

    <p>
      A handmade stirling silver heart ring designed with elegance and simplicity in mind,
      a timeless classic.
    </p>

    <div class="price">$219.99</div>

    <div class="buttons">
      <button class="buy" onclick="buyNow('Silver Heart Ring', 219.99, 'heartring4.jpg')">
        Buy Now
      </button>
      <button class="cart" onclick="addToCart(this)">Add to Cart</button>
    </div>
  </div>

</div> <!-- ✅ FIXED: closed container -->

<a href="rings.html" class="back">← Back</a>

<script>
// IMAGE SWITCH
function changeImage(src) {
  const img = document.getElementById("mainImage");
  img.style.opacity = 0;

  setTimeout(() => {
    img.src = src;
    img.style.opacity = 1;
  }, 100);
}

// BUY NOW → save product + redirect
function buyNow(name, price, image) {
  const product = {
    name: name,
    price: price,
    image: image
  };

  localStorage.setItem("checkoutProduct", JSON.stringify(product));
  window.location.href = "checkout.html";
}

// ADD TO CART animation
function addToCart(button) {
  button.classList.add("animate");

  setTimeout(() => {
    button.classList.remove("animate");
  }, 75 );
}
</script>

</body>
</html>
