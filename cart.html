<!DOCTYPE html>
<html>
<head>
  <title>Your Cart - KingsCraft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: black;
      color: white;
      font-family: Georgia, serif;
      padding: 40px;
    }

    h1 {
      text-align: center;
      color: #e2bc6c;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 28px;
      color: #ccc;
      text-decoration: none;
      z-index: 1000;
      transition: 0.2s;
      cursor: pointer;
    }

    .back-btn:hover {
      color: white;
      transform: translateX(-3px);
      text-decoration: none;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    .item img {
      width: 80px;
    }

    .price {
      color: gold;
    }

    select {
      margin-top: 8px;
      padding: 6px;
      background: #111;
      color: white;
      border: 1px solid #333;
    }

    .remove-btn {
      width: 18px;
      height: 18px;
      background: #777;
      border-radius: 50%;
      position: relative;
      cursor: pointer;
    }

    .remove-btn::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 2px;
      background: black;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .total {
      text-align: center;
      margin-top: 30px;
      font-size: 20px;
    }

    .checkout-btn {
      display: block;
      margin: 30px auto;
      padding: 15px 30px;
      background: gold;
      color: black;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .checkout-btn:disabled {
      background: #555;
      color: #999;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

<a onclick="goBackToPreviousPage()" class="back-btn">←</a>

<h1>Your Cart</h1>

<div id="cartItems"></div>

<div class="total" id="totalPrice"></div>

<button id="checkoutBtn" class="checkout-btn" onclick="goToCheckout()">Checkout</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("cartItems");
const totalDisplay = document.getElementById("totalPrice");
const checkoutBtn = document.getElementById("checkoutBtn");

function goBackToPreviousPage() {
  const lastPage = localStorage.getItem("lastPageBeforeCart");

  if (lastPage) {
    window.location.href = lastPage;
  } else {
    window.location.href = "home.html";
  }
}

// 🔥 RENDER FUNCTION
function renderCart() {
  container.innerHTML = "";
  let total = 0;

  if (cart.length === 0) {
    container.innerHTML = "<p style='text-align:center;color:#777;'>Your cart is empty</p>";
  }

  cart.forEach((item, index) => {
    total += item.price;

    if (!item.size) {
      item.size = "Size 4";
    }

    container.innerHTML += `
      <div class="item">
        <img src="${item.image}">
        
        <div style="flex:1;">
          <div>${item.name}</div>
          <div class="price">$${item.price}</div>

          <div style="margin-top:8px; color:#ccc;">
            ${item.size || "Size not selected"}
          </div>
        </div>

        <div class="remove-btn" onclick="removeItem(${index})"></div>
      </div>
    `;
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  totalDisplay.innerText = "Total: $" + total.toFixed(2);

  checkoutBtn.disabled = cart.length === 0;
}

// 🔥 SAVE SIZE CHANGE
function updateSize(index, size) {
  cart[index].size = size;
  localStorage.setItem("cart", JSON.stringify(cart));
}

// 🔥 REMOVE ITEM (NO REFRESH)
function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

async function goToCheckout() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  try {
    const response = await fetch("https://kingscraft-backend.onrender.com/create-checkout-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ cart })
    });

    const data = await response.json();
    window.location.href = data.url;

  } catch (err) {
    console.error("ERROR:", err);
  }
}

// INITIAL LOAD
renderCart();
</script>

</body>
</html>
