<!DOCTYPE html>
<html>
<head>
  <title>Your Cart - KingsCraft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: black;
      color: white;
      font-family: Georgia, serif;
      padding: 40px;
    }

    h1 {
      text-align: center;
      color: #e2bc6c;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    .item img {
      width: 80px;
    }

    .price {
      color: gold;
    }

    .total {
      text-align: center;
      margin-top: 30px;
      font-size: 20px;
    }

    .checkout-btn {
      display: block;
      margin: 30px auto;
      padding: 15px 30px;
      background: gold;
      color: black;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Your Cart</h1>

<div id="cartItems"></div>

<div class="total" id="totalPrice"></div>

<button class="checkout-btn" onclick="goToCheckout()">Checkout</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

const container = document.getElementById("cartItems");

cart.forEach(item => {
  total += item.price;

  container.innerHTML += `
    <div class="item">
      <img src="${item.image}">
      <div>
        <div>${item.name}</div>
        <div class="price">$${item.price}</div>
      </div>
    </div>
  `;
});

document.getElementById("totalPrice").innerText = "Total: $" + total.toFixed(2);

function goToCheckout() {
  window.location.href = "checkout.html";
}
</script>

</body>
</html>
