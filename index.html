<!DOCTYPE html>
<html>
<head>
  <title>KingsCraft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: black;
      color: #e2bc6c;
    }

    header {
      text-align: center;
      padding: 30px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    header img {
      max-width: 180px;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .title-logo {
      max-width: 300px;
      width: 80%;
      margin-bottom: 10px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .hero p {
      color: #ccc;
      font-size: 18px;
    }

    .btn {
      margin-top: 30px;
      display: inline-block;
      padding: 14px 30px;
      background: gold;
      color: black;
      text-decoration: none;
      font-weight: bold;
    }

    .categories {
      padding: 60px 20px;
      border-top: 2px solid #FFF;
      border-bottom: 2px solid #FFF;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .card {
      position: relative;
      height: 220px;
      background-size: cover;
      background-position: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: 0.3s;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      transition: 0.3s;
    }

    .card span {
      position: relative;
      color: white;
      font-size: 24px;
      text-align: center;
      z-index: 1;
      padding: 10px;
    }

    .card:hover::before {
      background: rgba(0,0,0,0.2);
    }

    .card:hover {
      transform: scale(1.03);
    }

    footer {
      padding: 40px;
      text-align: center;
      color: #ccc;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

<header>
  <img src="FullLogo.png">
</header>

<section class="hero">
  <!-- ✅ FIX: image moved here -->
  <img src="KingsCraftt.png" class="title-logo">

  <!-- ❌ REMOVED: <h1>KingsCraft</h1> -->
  <p>Custom Jewelry • Crafted to Matter</p>
</section>

<section class="categories">
  <div class="grid">

    <a href="rings.html" class="card" style="background-image:url('tempp.png')">
      <span>Shop Rings</span>
    </a>

    <a href="#" class="card" style="background-image:url('tempp.png')">
      <span>Shop Chains</span>
    </a>

    <a href="rings.html" class="card" style="background-image:url('Cross1.jpg')">
      <span>Shop Pendants & Charms</span>
    </a>

    <a href="#" class="card" style="background-image:url('tempp.png')">
      <span>Shop Earrings & Studs</span>
    </a>

    <a href="#" class="card" style="background-image:url('tempp.png')">
      <span>Special Items</span>
    </a>

    <a href="#" class="card" style="background-image:url('tempp.png')">
      <span>Signature Designs</span>
    </a>

    <a href="#" class="card" style="background-image:url('tempp.png')">
      <span>Handmade</span>
    </a>

    <a href="#" class="card" style="background-image:url('tempp.png')">
      <span>Contact Us</span>
    </a>

  </div>
</section>

<footer>
  Placeholder.
</footer>

</body>
</html>
