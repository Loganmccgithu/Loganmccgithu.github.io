<!DOCTYPE html>
<html>
<head>
  <title>KingsCraft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: #0a0a0a;
      color: white;
    }

    header {
      text-align: center;
      padding: 30px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    header img {
      max-width: 180px;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #ccc;
      font-size: 18px;
    }

    .btn {
      margin-top: 30px;
      display: inline-block;
      padding: 14px 30px;
      background: gold;
      color: black;
      text-decoration: none;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .section {
      padding: 80px 20px;
      text-align: center;
    }

    .products {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .product {
      width: 250px;
      height: 300px;
      background: #111;
      border: 1px solid rgba(255,255,255,0.1);
    }

    footer {
      padding: 40px;
      text-align: center;
      color: #777;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

<header>
  <img src="FullLogo.png">
</header>

<section class="hero">
  <h1>KingsCraft</h1>
  <p>Bespoke Jewelry • Crafted to Be Noticed </p>
  <a class="btn" href="#">Shop Coming Soon</a>
</section>

<section class="section">

  <div class="product-container">

    <!-- LEFT: MAIN IMAGE -->
    <div class="image-section">
      <img id="mainImage" src="Cross1.jpg" onclick="openGallery(0)">
      
      <div class="thumbnails">
        <img src="Cross1.jpg" onclick="changeImage(0)">
        <img src="Cross2.jpg" onclick="changeImage(1)">
        <img src="Cross3.jpg" onclick="changeImage(2)">
        <img src="back2.jpg" onclick="changeImage(3)">
      </div>
    </div>

    <!-- RIGHT: PRODUCT INFO -->
    <div class="info-section">
      <h2>Signature Cross Pendant</h2>

      <!-- IMAGE DESCRIPTION -->
      <p id="imageDescription">
        Front view of the cross pendant with polished finish.
      </p>

      <h3>$79.99</h3>

      <!-- BUTTONS UNDER DESCRIPTION -->
      <div class="buttons">
        <button>Buy Now</button>
        <button class="secondary">Add to Cart</button>
      </div>
    </div>

  </div>

  <!-- FULLSCREEN GALLERY -->
  <div id="galleryModal" class="modal" onclick="closeGallery()">
    <span class="close">&times;</span>
    <img class="modal-content" id="galleryImage">
  </div>

</section>

<footer>
  © 2026 KingsCraft. All rights reserved.
</footer>

</body>
</html>
