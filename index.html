<!DOCTYPE html>
<html>
<head>
  <title>KingsCraft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: black;
      color: white;
    }

    header {
      text-align: center;
      padding: 30px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    header img {
      max-width: 180px;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #ccc;
      font-size: 18px;
    }

    .btn {
      margin-top: 30px;
      display: inline-block;
      padding: 14px 30px;
      background: gold;
      color: black;
      text-decoration: none;
      font-weight: bold;
    }

    /* ========================= */
    /* CATEGORY GRID (NEW)       */
    /* ========================= */
  
    .categories {
      padding: 60px 20px;
      border-top: 2px white;           /* horizontal lines on homepage? */
      border-bottom: 2px white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .card {
      position: relative;
      height: 220px;
      background-size: cover;
      background-position: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: 0.3s;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      transition: 0.3s;
    }

    .card span {
      position: relative;
      color: white;
      font-size: 24px;
      text-align: center;
      z-index: 1;
      padding: 10px;
    }

    .card:hover::before {
      background: rgba(0,0,0,0.2);
    }

    .card:hover {
      transform: scale(1.03);
    }

    /* ========================= */
    /* PRODUCT SECTION           */
    /* ========================= */

    .section {
      padding: 80px 20px;
    }

    .product-container {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      justify-content: center;
      align-items: flex-start;
    }

    .image-section {
      max-width: 400px;
    }

    .image-section img {
      width: 100%;
      cursor: pointer;
    }

    .thumbnails {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .thumbnails img {
      width: 70px;
    }

    .info-section {
      max-width: 400px;
      text-align: left;
    }

    .buttons {
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      background: gold;
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
    }

    button.secondary {
      background: transparent;
      color: white;
      border: 1px solid white;
    }

    /* ========================= */
    /* MODAL                    */
    /* ========================= */

    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      padding-top: 100px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.9);
    }

    .modal-content {
      display: block;
      margin: auto;
      max-width: 80%;
    }

    .close {
      position: absolute;
      top: 40px;
      right: 60px;
      color: #EFBF04;
      font-size: 40px;
      cursor: pointer;
    }

    footer {
      padding: 40px;
      text-align: center;
      color: #ccc;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

  </style>
</head>

<body>

<header>
  <img src="FullLogo.png">
</header>

<section class="hero">
  <h1>KingsCraft</h1>
  <p>Bespoke Jewelry • Crafted to Matter</p>
</section>

<!-- 🔥 CATEGORY GRID -->
<section class="categories">
  <div class="grid">

    <a href="#" class="card" style="background-image:url('tempp.png')">
      <span>Shop Rings</span>
    </a>

    <a href="#" class="card" style="background-image:url('tempp.png')">
      <span>Shop Chains</span>
    </a>

    <a href="#" class="card" style="background-image:url('Cross1.jpg')">
      <span>Shop Pendants & Charms</span>
    </a>

    <a href="#" class="card" style="background-image:url('tempp.png')">
      <span>Shop Earrings & Studs</span>
    </a>

    <a href="#" class="card" style="background-image:url('tempp.png')">
      <span>Special Items</span>
    </a>

    <a href="#" class="card" style="background-image:url('tempp.png')">
      <span>Signature Designs</span>
    </a>

    <a href="#" class="card" style="background-image:url('tempp.png')">
      <span>Handmade</span>
    </a>

    <a href="#" class="card" style="background-image:url('tempp.png')">
      <span>Contact Us</span>
    </a>

  </div>
</section>
</section>

<footer>
  Placeholder.
</footer>

<script>

function changeImage(index) {
  document.getElementById("mainImage").src = images[index].src;
  document.getElementById("imageDescription").innerText = images[index].desc;
}

function openGallery(index) {
  document.getElementById("galleryModal").style.display = "block";
  document.getElementById("galleryImage").src = images[index].src;
}

function closeGallery() {
  document.getElementById("galleryModal").style.display = "none";
}
</script>

</body>
</html>
