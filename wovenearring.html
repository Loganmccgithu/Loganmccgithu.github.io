<!DOCTYPE html>
<html>
<head>
  <title>Silver Woven Earrings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: black;
      color: white;
    }

    header {
      text-align: center;
      padding: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    header img {
      max-width: 150px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 50px;
      padding: 60px 20px;
      justify-content: center;
      align-items: flex-start;
    }

    /* IMAGE SECTION */
    .images {
      max-width: 400px;
    }

    /* 🔥 NEW: LOCKED IMAGE FRAME */
    .main-image-container {
      width: 100%;
      height: 400px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .main-image-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: opacity 0.2s ease;
    }

    .thumbnails {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .thumbnails img {
      width: 70px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* PRODUCT INFO */
    .info {
      max-width: 400px;
    }

    .info h2 {
      color: #e2bc6c;
    }

    .price {
      color: gold;
      font-size: 22px;
      margin: 15px 0;
    }

    .buttons {
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
      border: none;
    }

    .buy {
      background: gold;
      color: black;
    }

    .cart {
      background: transparent;
      color: white;
      border: 1px solid white;
    }

    .back {
      display: block;
      text-align: center;
      margin: 40px;
      color: #ccc;
      text-decoration: none;
    }
  </style>
</head>

<body>

<a href="rings.html" class="back-btn">←</a>

<header>
  <img src="FullLogo.png">
</header>
  
<div class="container">

  <!-- LEFT: IMAGES -->
  <div class="images">

    <!-- 🔥 UPDATED IMAGE WRAPPER -->
    <div class="main-image-container">
      <img id="mainImage" src="earring2.png">
    </div>

    <div class="thumbnails">
      <img src="earring2.png" onclick="changeImage('earring2.png')">
      <img src="earring1.png" onclick="changeImage('earring1.png')">
      <img src="earring3.png" onclick="changeImage('earring3.png')">
      <img src="earring4.png" onclick="changeImage('earring4.png')">
    </div>
  </div>

  <!-- RIGHT: INFO -->
  <div class="info">
    <h2>Silver Woven Earrings</h2>

    <p>
      Handmade stirling silver earrings with a woven design.
      Size: Small
    </p>

    <div class="price">$155.99</div>

    <div class="buttons">
      <button class="buy">Buy Now</button>
      <button class="cart">Add to Cart</button>
    </div>
  </div>

</div>

<script>
// IMAGE SWITCH
function changeImage(src) {
  const img = document.getElementById("mainImage");
  img.style.opacity = 0;

  setTimeout(() => {
    img.src = src;
    img.style.opacity = 1;
  }, 100);
}

function showLoading() {
  document.getElementById("loadingPopup").style.display = "flex";
}

function hideLoading() {
  document.getElementById("loadingPopup").style.display = "none";
}

// BUY NOW
async function buyNow(name, price, image) {

  showLoading();

  const size = document.getElementById("sizeSelect").value;

  const cart = [{
    name,
    price,
    image,
    type: "earring",
    size: size
  }];

  try {
    const response = await fetch("https://kingscraft-backend.onrender.com/create-checkout-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ cart })
    });

    const data = await response.json();
    window.location.href = data.url;

  } catch (err) {

    hideLoading();

    console.error("ERROR:", err);
    alert("Checkout failed. Please try again.");
  }
}

// ADD TO CART
function addToCart(button) {
  const sizeSelect = document.getElementById("sizeSelect");

  if (!sizeSelect) {
    alert("Size selector not found.");
    return;
  }

  const size = sizeSelect.value;

  const product = {
    name: "Silver Woven Earrings",
    price: 155.99,
    image: "earring2.png",
    type: "earring",
    size: size
  };

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));

  updateCartCount();

  button.classList.add("animate");
  setTimeout(() => button.classList.remove("animate"), 200);

  const icon = document.querySelector(".cart-icon");
  icon.classList.add("cart-bounce");
  setTimeout(() => icon.classList.remove("cart-bounce"), 200);
}

// UPDATE COUNT
function updateCartCount() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  document.getElementById("cartCount").innerText = cart.length;
}

// GO TO CART PAGE
function goToCart() {
  window.location.href = "cart.html";
}

// LOAD COUNT ON PAGE LOAD
updateCartCount();
</script>

<!-- LOADING POPUP -->
<div id="loadingPopup" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  z-index:9999;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  font-family:Georgia, serif;
">

  <div style="
    width:60px;
    height:60px;
    border:5px solid #333;
    border-top:5px solid gold;
    border-radius:50%;
    animation:spin 1s linear infinite;
  "></div>

  <p style="margin-top:20px; font-size:20px;">
  Preparing Secure Checkout...
  </p>

  <button onclick="hideLoading()" style="
    margin-top:25px;
    background:transparent;
    border:1px solid white;
    color:white;
    padding:10px 20px;
    cursor:pointer;
    font-family:Georgia, serif;
  ">
    ← Back
  </button>

</div>

<style>
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>

</body>
</html>
